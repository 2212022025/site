<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Services And Event | EBMS-09/EVMS-09</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Color Palette & Variables based on the aesthetic image */
        :root {
            --bg-light: #F6F4F0;
            --bg-accent: #EAE3D9;
            --bg-darker: #5A4B42;
            --text-main: #3E3832;
            --text-light: #7A7268;
            --border-color: #D3CBC1;
            --white: #FFFFFF;
            --font-heading: 'Lora', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
        }

        h1, h2, h3, h4 {
            font-family: var(--font-heading);
            font-weight: 400;
        }

        /* Top Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background-color: var(--white);
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 2px;
            color: #C09A6D;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-light);
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--text-main);
        }

        .nav-icons {
            display: flex;
            gap: 20px;
            color: var(--text-light);
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            background-color: var(--bg-accent);
            text-align: center;
            padding: 50px 20px;
            position: relative;
        }

        .hero h1 {
            font-size: 1.6rem;
            margin-bottom: 18px;
            color: var(--text-main);
            letter-spacing: 2px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 30px;
            border: 1px solid var(--text-main);
            background: transparent;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn:hover {
            background-color: var(--text-main);
            color: var(--white);
        }

        .btn-red {
            background-color: #dc3545;
            color: var(--white);
            border-color: #dc3545;
        }

        .btn-red:hover {
            background-color: #c82333;
            border-color: #bd2130;
        }

        .btn-green {
            background-color: #28a745;
            color: var(--white);
            border-color: #28a745;
        }

        /* Wavy Divider */
        .wave-container {
            width: 100%;
            overflow: hidden;
            line-height: 0;
            background-color: var(--bg-light);
        }

        .wave-container svg {
            position: relative;
            display: block;
            width: calc(100% + 1.3px);
            height: 60px;
            fill: #BAA892;
        }

        /* Container for Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Winner Display */
        .winner-card {
            background: var(--white);
            padding: 40px;
            border: 1px solid var(--border-color);
            text-align: center;
            max-width: 500px;
            margin: 0 auto 50px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .winner-item {
            font-family: var(--font-heading);
            margin: 15px 0;
        }

        .rank-1 {
            font-size: 1.8rem;
            color: #C09A6D;
            font-weight: 500;
        }

        .rank-2 {
            font-size: 1.4rem;
            color: var(--text-main);
        }

        /* Report Section Styles */
        .report-section {
            text-align: center;
            margin-top: 40px;
        }

        .report-form {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            animation: fadeIn 0.4s ease-in-out;
        }

        .report-form input {
            padding: 12px 20px;
            font-size: 0.85rem;
            border: 1px solid var(--border-color);
            background-color: var(--white);
            color: var(--text-main);
            outline: none;
            font-family: var(--font-body);
            width: 250px;
            border-radius: 4px;
        }

        .send-btn {
            background-color: var(--text-main);
            color: var(--white);
            border: 1px solid var(--text-main);
            border-radius: 4px;
        }

        /* Divider Play Archery Button */
        .divider-btn-container {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 800px;
            margin: 40px auto;
        }

        .divider-btn-container::before,
        .divider-btn-container::after {
            content: '';
            flex: 1;
            border-bottom: 2px dashed var(--border-color);
        }

        .divider-btn-container::before { margin-right: 20px; }
        .divider-btn-container::after { margin-left: 20px; }

        /* Feature Cards */
        .feature-cards-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
        }

        .feature-card {
            display: flex;
            align-items: center;
            background-color: var(--white);
            padding: 25px 30px;
            border: 1px solid var(--border-color);
            text-decoration: none;
            color: inherit;
            width: 100%;
            transition: transform 0.3s ease;
            cursor: pointer;
            text-align: left;
        }

        .feature-card:hover {
            transform: translateY(-3px);
        }

        .feature-card .icon-box {
            width: 60px;
            height: 60px;
            border: 1px solid #C09A6D;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 25px;
            flex-shrink: 0;
            color: #C09A6D;
            font-size: 1.5rem;
        }

        .feature-card .text-box h4 {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #000;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px;
            background-color: var(--bg-darker);
            color: var(--bg-accent);
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .report-form { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <!-- Header / Navigation -->
    <header>
        <div class="logo">Web Services <span style="color: var(--text-main);">& Event</span></div>
        <div class="nav-links">
            <a href="#hero">Overview</a>
            <a href="#winners">Winners</a>
        </div>
        <div class="nav-icons">
            <i class="fas fa-search"></i>
            <i class="far fa-user"></i>
        </div>
    </header>

    <!-- Hero Section -->
    <section id="hero" class="hero">
        <h1>EBMS-09 / EVMS-09</h1>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 10px;">
            <a href="https://archerpro.netlify.app/tournament.html" class="btn"><i class="fas fa-play"></i> Play Archer 🏹</a>
        </div>
    </section>

    <!-- Wavy Aesthetic Divider -->
    <div class="wave-container">
        <svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
            <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z"></path>
        </svg>
    </div>

    <!-- Main Content -->
    <div class="container">
        
        <!-- Winners Section -->
        <section id="winners">
            <h2 class="section-title">Archer Tournament Winners</h2>
            <div class="winner-card">
                <div class="winner-item rank-1">
                    <i class="fas fa-crown"></i> #1 Shadow
                </div>
                <div class="winner-item rank-2">
                    #2 Iron-Man
                </div>
            </div>

            <!-- Report Player Section -->
            <div class="report-section">
                <button id="reportPlayerBtn" class="btn btn-red">Report Player</button>
                
                <div id="reportForm" class="report-form" style="display: none;">
                    <input type="text" id="roomCodeInput" placeholder="Enter Room Code">
                    <button id="sendReportBtn" class="btn send-btn">Send</button>
                </div>

                <div style="margin-top: 25px; width: 100%;">
                    
                    <!-- Divider Button: Play Archery -->
                    <div class="divider-btn-container">
                        <a href="https://archerpro.netlify.app/tournament.html" class="btn btn-green">
                            <i class="fas fa-bullseye"></i> Play Archer Fight
                        </a>
                    </div>

                    <!-- Feature Cards Section -->
                    <div class="feature-cards-wrapper">
                        
                        <!-- Check FRS Rating Card -->
                        <a href="https://2212022025.github.io/Consoles-app/frs.html" class="feature-card">
                            <div class="icon-box">
                                <i class="fas fa-star"></i>
                            </div>
                            <div class="text-box">
                                <h4>Check Your FRS Rating</h4>
                                <p></p>
                            </div>
                        </a>
                        
                        <!-- Moderator Message Card -->
                        <button id="modMsgBtn" class="feature-card" style="border: 1px solid var(--border-color); background: var(--white); font-family: inherit;">
                            <div class="icon-box">
                                <i class="fas fa-handshake"></i>
                            </div>
                            <div class="text-box">
                                <h4>Moderator Message</h4>
                                <p></p>
                            </div>
                        </button>

                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Web Services & Event. Site-Number_11/EBMS-09/EVMS-09.VLF-Tec</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Setup Report Player functionality
            const reportBtn = document.getElementById('reportPlayerBtn');
            const reportForm = document.getElementById('reportForm');
            const sendBtn = document.getElementById('sendReportBtn');
            const roomCodeInput = document.getElementById('roomCodeInput');

            reportBtn.addEventListener('click', () => {
                if (reportForm.style.display === 'none' || reportForm.style.display === '') {
                    reportForm.style.display = 'flex';
                    roomCodeInput.focus();
                } else {
                    reportForm.style.display = 'none';
                }
            });

            sendBtn.addEventListener('click', () => {
                const roomCode = roomCodeInput.value.trim();
                if (roomCode) {
                    const email = 'uranetworksresponse@gmail.com';
                    const subject = encodeURIComponent('Report //Report Player (' + roomCode + ')');
                    const body = encodeURIComponent('Please Review This Match,');
                    window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
                } else {
                    alert('Please enter a Room Code first.');
                }
            });

            // Handle Moderator message
            const modMsgBtn = document.getElementById('modMsgBtn');
            modMsgBtn.addEventListener('click', () => {
                alert('The Username for Gaming Hub is:- 123');
            });
        });
    </script>
</body>
</html>
